spring.application.name=ScheduleMeetingBE

spring.datasource.url=jdbc:postgresql://${DB_HOST_POSTGRES}:5432/${DB_NAME_POSTGRES}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

springdoc.swagger-ui.oauth2-redirect-url="/api/v1/public/swagger-ui.html"
springdoc.api-docs.path=/api/v1/public/api-docs
springdoc.swagger-ui.operationsSorter=alpha

spring.mail.port=587
spring.mail.host=smtp.gmail.com
spring.mail.username=nguyenvu19a19@gmail.com
spring.mail.password=${APP_EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.password=${REDIS_PASS}
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1